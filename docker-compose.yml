version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped
